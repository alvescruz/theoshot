name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: theoshot
            asset_name: theoshot-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: theoshot.exe
            asset_name: theoshot-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: theoshot
            asset_name: theoshot-macos-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libpipewire-0.3-dev libdbus-1-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Assets
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Build Linux Packages (.deb, .rpm)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-deb cargo-generate-rpm
          cargo deb --target ${{ matrix.target }} --no-build
          # Note: cargo-generate-rpm might require the binary to be in a specific place or use flags
          cargo generate-rpm --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb dist/
          cp target/${{ matrix.target }}/generate-rpm/*.rpm dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
