name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: theoshot
            asset_name: theoshot-linux-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libpipewire-0.3-dev libdbus-1-dev pkg-config

      - name: Cache Cargo tools
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: ${{ runner.os }}-cargo-tools-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          # Facilitar para as ferramentas de empacotamento que buscam em target/release
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/release/

      - name: Build Linux Packages (.deb, .rpm)
        if: matrix.os == 'ubuntu-latest'
        run: |
          which cargo-deb || cargo install cargo-deb
          which cargo-generate-rpm || cargo install cargo-generate-rpm
          
          # Gera o .deb (já configurado no Cargo.toml)
          cargo deb --target ${{ matrix.target }} --no-build
          
          # Gera o .rpm
          cargo generate-rpm --target ${{ matrix.target }}

      - name: Prepare Assets
        shell: bash
        run: |
          mkdir -p dist
          # Binário puro
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
          # Pacotes Linux
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cp target/${{ matrix.target }}/debian/*.deb dist/ || true
            cp target/generate-rpm/*.rpm dist/ || true
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
